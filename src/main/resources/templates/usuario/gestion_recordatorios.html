<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mis Recordatorios - Clínica App</title>
    <link th:replace="~{fragments/header :: favIcon}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    
    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1>Mis Recordatorios</h1>
                <p class="lead text-muted">Nunca más olvides una fecha importante para la salud de tus mascotas.</p>
            </div>
            <button class="btn btn-primary btn-lg" disabled><i class="bi bi-plus-circle me-2"></i>Añadir Recordatorio</button>
        </div>
        
        <div class="text-center py-5">
            <i class="bi bi-tools fs-1"></i>
            <h2 class="mt-3">Función en Desarrollo</h2>
            <p class="lead">Estamos trabajando para traerte un sistema de recordatorios inteligente. ¡Vuelve pronto!</p>
        </div>
    </main>
    <div th:replace="~{fragments/footer :: footer-usuario}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="~{fragments/asistente_voz :: mic-button}"></div>
</body>
</html>
