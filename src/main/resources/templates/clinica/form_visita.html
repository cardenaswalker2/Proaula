<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atención Médica - ClínicaApp</title>
    <link th:replace="~{fragments/header :: favIcon}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a;
            --primary-light: #334155;
            --success: #059669;
            --success-light: #34d399;
            --info: #0891b2;
            --info-light: #67e8f9;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --shadow-soft: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body { 
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdf4 100%);
            color: #334155;
            min-height: 100vh;
        }

        /* Header Médico Premium */
        .page-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            color: white; 
            padding: 3rem 0; 
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
            animation: pulse-glow 4s ease-in-out infinite;
        }

        .page-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #38bdf8, #34d399, #fbbf24, #f472b6);
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .page-header h1 {
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }

        .page-header h1 i {
            background: linear-gradient(135deg, #38bdf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            vertical-align: middle;
            margin-right: 0.75rem;
            animation: heartbeat 2s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10% { transform: scale(1.1); }
            20% { transform: scale(1); }
            30% { transform: scale(1.1); }
            40% { transform: scale(1); }
        }

        .page-header p {
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: 400;
        }

        .btn-outline-light {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1;
        }

        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Form Card Premium */
        .form-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
            max-width: 900px; 
            margin: 0 auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .form-header { 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            padding: 2rem; 
            border-bottom: 2px solid #e2e8f0;
            position: relative;
        }

        .form-header::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background: linear-gradient(to bottom, #38bdf8, #34d399);
        }

        .form-header h5 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .form-header i {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 1.25rem;
        }

        .form-header .text-primary {
            background: linear-gradient(135deg, #0284c7, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .form-body { 
            padding: 2.5rem; 
        }

        /* Info Box Mejorado */
        .info-box {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border-left: none;
            border-radius: var(--radius-md);
            padding: 1.5rem; 
            margin-bottom: 2.5rem;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.1);
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .info-box::before {
            content: '\F26B';
            font-family: 'bootstrap-icons';
            font-size: 1.5rem;
            color: #059669;
            background: white;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.2);
            flex-shrink: 0;
        }

        /* Section Headers Premium */
        .section-header {
            display: flex; 
            align-items: center; 
            gap: 1rem;
            margin: 2.5rem 0 1.5rem 0; 
            padding-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
            position: relative;
        }

        .section-header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, #0ea5e9, #34d399);
        }

        .section-number {
            width: 36px; 
            height: 36px; 
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
            color: white; 
            border-radius: 12px; 
            display: flex;
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.3);
            position: relative;
            overflow: hidden;
        }

        .section-number::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .section-header h6 {
            font-size: 1.15rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }

        /* Form Controls Premium */
        .form-label {
            font-weight: 600;
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 0.875rem 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .form-control:focus { 
            border-color: #38bdf8; 
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
            background: white;
            transform: translateY(-1px);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .input-group-text {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            border: 2px solid #e2e8f0;
            border-right: none;
            border-radius: 12px 0 0 12px;
            font-weight: 700;
            color: #0369a1;
            padding: 0.875rem 1.25rem;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
        }

        /* Vital Cards */
        .vitals-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .vital-input-card {
            background: white;
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .vital-icon {
            font-size: 1.25rem;
            color: #0ea5e9;
            margin-bottom: 0.5rem;
        }

        /* Status Selectors */
        .status-select {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 0.875rem 1rem;
            width: 100%;
            background-color: #f8fafc;
            font-weight: 600;
        }

        small.text-muted {
            font-size: 0.85rem;
            color: #64748b !important;
            margin-top: 0.5rem;
            display: block;
            font-weight: 500;
        }

        /* Submit Button Premium */
        .btn-submit {
            background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);
            color: white; 
            border: none;
            padding: 1.25rem 3rem; 
            border-radius: 16px; 
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(5, 150, 105, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-submit:hover { 
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 40px rgba(5, 150, 105, 0.4);
            color: white;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit i {
            font-size: 1.25rem;
        }

        /* Border top section */
        .border-top {
            border-top: 2px solid #e2e8f0 !important;
            margin-top: 3rem;
            padding-top: 2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-header {
                padding: 2rem 0;
            }
            
            .page-header h1 {
                font-size: 1.5rem;
            }
            
            .form-body {
                padding: 1.5rem;
            }
            
            .btn-submit {
                width: 100%;
                justify-content: center;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #0ea5e9 0%, #059669 100%);
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="page-header shadow-sm">
        <div class="container text-center text-md-start d-md-flex justify-content-between align-items-center">
            <div>
                <h1 class="h3 fw-800 mb-1"><i class="bi bi-heart-pulse-fill me-2 text-info"></i> Registro de Atención Médica</h1>
                <p class="mb-0 opacity-75">Completando la historia clínica del paciente</p>
            </div>
            <a th:href="@{/clinica/citas}" class="btn btn-outline-light mt-3 mt-md-0 border-2 rounded-pill px-4">
                <i class="bi bi-arrow-left"></i> Salir sin guardar
            </a>
        </div>
    </div>

    <main class="container pb-5">
        <div class="form-card">
            <div class="form-header">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold text-dark">
                        <i class="bi bi-file-earmark-medical text-primary me-2"></i>
                        Paciente: <span class="text-primary" th:text="${nombreMascota}">Nombre Mascota</span>
                    </h5>
                    <div class="text-end">
                        <span class="badge bg-info bg-opacity-10 text-info px-3 py-2 rounded-pill small">
                            <i class="bi bi-layers-fill me-1"></i> Servicios: <span th:text="${serviciosSolicitados}">--</span>
                        </span>
                    </div>
                </div>
            </div>

            <div class="form-body">
                <form th:action="@{/clinica/visitas/guardar}" th:object="${visitaDTO}" method="post">
                    
                    <!-- Datos ocultos técnicos -->
                    <input type="hidden" th:field="*{citaId}" />
                    <input type="hidden" th:field="*{mascotaId}" />
                    <input type="hidden" th:field="*{clinicaId}" />

                    <!-- SECCIÓN 1: CONSTANTES CLÍNICAS -->
                    <div class="section-header mt-0">
                        <div class="section-number">1</div>
                        <h6 class="mb-0 fw-bold">Constantes Vitales y Triaje</h6>
                    </div>

                    <div class="vitals-grid">
                        <div class="vital-input-card">
                            <i class="bi bi-speedometer2 vital-icon"></i>
                            <label class="form-label justify-content-center">Peso</label>
                            <div class="input-group">
                                <input type="number" step="0.1" class="form-control text-center" th:field="*{peso}" placeholder="0.0">
                                <span class="input-group-text p-2" style="font-size: 0.7rem;">kg</span>
                            </div>
                        </div>
                        <div class="vital-input-card">
                            <i class="bi bi-thermometer-half vital-icon" style="color: #ef4444;"></i>
                            <label class="form-label justify-content-center">Temp.</label>
                            <div class="input-group">
                                <input type="number" step="0.1" class="form-control text-center" th:field="*{temperatura}" placeholder="38.0">
                                <span class="input-group-text p-2" style="font-size: 0.7rem;">°C</span>
                            </div>
                        </div>
                        <div class="vital-input-card">
                            <i class="bi bi-heart-pulse vital-icon" style="color: #059669;"></i>
                            <label class="form-label justify-content-center">Frec. Card.</label>
                            <div class="input-group">
                                <input type="number" class="form-control text-center" th:field="*{frecuenciaCardiaca}" placeholder="80">
                                <span class="input-group-text p-2" style="font-size: 0.7rem;">bpm</span>
                            </div>
                        </div>
                        <div class="vital-input-card">
                            <i class="bi bi-wind vital-icon" style="color: #6366f1;"></i>
                            <label class="form-label justify-content-center">Frec. Resp.</label>
                            <div class="input-group">
                                <input type="number" class="form-control text-center" th:field="*{frecuenciaRespiratoria}" placeholder="20">
                                <span class="input-group-text p-2" style="font-size: 0.7rem;">rpm</span>
                            </div>
                        </div>
                    </div>

                    <!-- SECCIÓN 2: EXAMEN FÍSICO -->
                    <div class="section-header">
                        <div class="section-number">2</div>
                        <h6 class="mb-0 fw-bold">Evaluación Física General</h6>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">Estado de Conciencia</label>
                            <select class="status-select" th:field="*{estadoConciencia}">
                                <option value="Alerta">Alerta</option>
                                <option value="Deprimido">Deprimido</option>
                                <option value="Estuporoso">Estuporoso</option>
                                <option value="Comatoso">Comatoso</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">Condición Corporal</label>
                            <select class="status-select" th:field="*{condicionCorporal}">
                                <option value="1/5 (Delgadez extrema)">1/5 (Delgadez extrema)</option>
                                <option value="2/5 (Bajo peso)">2/5 (Bajo peso)</option>
                                <option value="3/5 (Ideal)">3/5 (Ideal)</option>
                                <option value="4/5 (Sobrepeso)">4/5 (Sobrepeso)</option>
                                <option value="5/5 (Obeso)">5/5 (Obeso)</option>
                            </select>
                        </div>
                    </div>

                    <!-- SECCIÓN 3: DIAGNÓSTICO -->
                    <div class="section-header">
                        <div class="section-number">3</div>
                        <h6 class="mb-0 fw-bold">Hallazgos y Diagnóstico</h6>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">Diagnóstico Médico</label>
                        <textarea class="form-control" th:field="*{diagnostico}" rows="3" 
                                  placeholder="Describa el estado del paciente y hallazgos clínicos..." required></textarea>
                    </div>

                    <!-- SECCIÓN 4: TRATAMIENTO -->
                    <div class="section-header">
                        <div class="section-number">4</div>
                        <h6 class="mb-0 fw-bold">Tratamiento y Receta</h6>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">Procedimientos Realizados</label>
                        <textarea class="form-control" th:field="*{tratamiento}" rows="2" 
                                  placeholder="Ej: Limpieza de herida, aplicación de suero..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">Medicamentos Recetados (Opcional)</label>
                        <textarea class="form-control" th:field="*{medicamentosRecetados}" rows="2" 
                                  placeholder="Nombre del medicamento, dosis y frecuencia..."></textarea>
                    </div>

                    <!-- SECCIÓN 5: SEGUIMIENTO Y COSTOS -->
                    <div class="section-header">
                        <div class="section-number">5</div>
                        <h6 class="mb-0 fw-bold">Seguimiento y Cierre</h6>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-primary"><i class="bi bi-calendar-check me-1"></i> Programar Próxima Cita</label>
                            <input type="datetime-local" class="form-control" th:field="*{fechaProximaCita}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-success"><i class="bi bi-cash-coin me-1"></i> Cargos Adicionales (USD)</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.1" class="form-control" th:field="*{costoTotal}" required>
                            </div>
                        </div>
                        <div class="col-12 mt-3">
                            <label class="form-label fw-bold small">Instrucciones para el dueño</label>
                            <textarea class="form-control" th:field="*{notasAdicionales}" rows="2" 
                                      placeholder="Ej: Dieta blanda por 48h, evitar contacto con otros perros..."></textarea>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5 border-top pt-4">
                        <button type="submit" class="btn-submit w-100 w-md-auto">
                            <i class="bi bi-cloud-check me-2"></i> Finalizar Historia Clínica
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
