<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | ClínicaApp</title>
    <link th:replace="~{fragments/header :: favIcon}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #059669 0%, #10b981 100%);
            --warning-gradient: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            --dark-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --shadow-soft: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            min-height: 100vh;
            color: #334155;
        }

        /* Navbar Premium */
        .navbar {
            background: var(--dark-gradient) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.25rem 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.35rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(to right, #fff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .navbar-brand i {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
            animation: gear-spin 4s linear infinite;
        }

        @keyframes gear-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn-outline-light {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 0.625rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Alerta de Éxito Animada */
        .alert-success {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border: none;
            border-radius: var(--radius-md);
            padding: 1.25rem 1.5rem;
            font-weight: 600;
            color: #065f46;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.15);
            animation: slideDown 0.5s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .alert-success i {
            font-size: 1.25rem;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-close {
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .btn-close:hover {
            opacity: 1;
        }

        /* Card Principal Premium */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        .card-header {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%) !important;
            border-bottom: 2px solid #e2e8f0;
            padding: 2rem !important;
            position: relative;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
        }

        .card-header h5 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f172a;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-header i {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.5rem;
            border-radius: 10px;
            font-size: 1.25rem;
        }

        .card-body {
            padding: 2.5rem !important;
        }

        /* Form Labels Premium */
        .form-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--primary-gradient);
            border-radius: 50%;
        }

        /* Inputs Premium */
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            font-size: 1rem;
            font-weight: 500;
            color: #0f172a;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: white;
            transform: translateY(-1px);
        }

        .form-control::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        /* Input Readonly */
        .form-control.bg-light {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%) !important;
            border-color: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
        }

        /* Small text helper */
        small.text-muted {
            font-size: 0.85rem;
            color: #64748b !important;
            margin-top: 0.5rem;
            display: block;
            font-weight: 500;
        }

        /* Textarea */
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }

        /* Divider */
        hr {
            border-color: #e2e8f0;
            margin: 2rem 0;
            opacity: 1;
        }

        /* Botones de Acción */
        .btn-light {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            color: #475569;
            border-radius: 12px;
            padding: 1rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-light:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
            color: #334155;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 1rem 2.5rem;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        /* Card de Advertencia */
        .card.border-warning {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%) !important;
            border: 2px solid #fcd34d !important;
            border-radius: var(--radius-md);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.1);
        }

        .card.border-warning .card-body {
            padding: 1.25rem !important;
        }

        .text-warning-emphasis {
            color: #92400e !important;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .text-warning-emphasis i {
            font-size: 1.1rem;
            animation: pulse-warning 2s infinite;
        }

        @keyframes pulse-warning {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .card-body {
                padding: 1.5rem !important;
            }

            .card-header {
                padding: 1.5rem !important;
            }

            .d-md-flex {
                flex-direction: column;
                gap: 1rem;
            }

            .btn-light, .btn-primary {
                width: 100%;
                justify-content: center;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-gradient);
            border-radius: 5px;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand"><i class="bi bi-building-gear me-2"></i> Configuración de la Sede</span>
            <a href="/clinica/dashboard" class="btn btn-outline-light btn-sm">Volver al Panel</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <!-- Alerta de éxito -->
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
                    <i class="bi bi-check-circle-fill me-2"></i> ¡Perfil actualizado correctamente!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i> Editar Información Pública</h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/clinica/perfil/actualizar}" th:object="${clinica}" method="post">
                            
                            <!-- Campo oculto para el ID -->
                            <input type="hidden" th:field="*{id}">

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Nombre de la Clínica</label>
                                    <input type="text" class="form-control" th:field="*{nombre}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Correo Electrónico (No editable)</label>
                                    <input type="email" class="form-control bg-light" th:field="*{email}" readonly>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Dirección Completa</label>
                                <input type="text" class="form-control" th:field="*{direccion}" required>
                                <small class="text-muted">Esta dirección aparecerá en el mapa para los clientes.</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Teléfono de Contacto</label>
                                <input type="text" class="form-control" th:field="*{telefono}" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Descripción de la Clínica</label>
                                <textarea class="form-control" th:field="*{descripcion}" rows="4" 
                                          placeholder="Cuéntale a tus clientes sobre tus servicios y especialidades..."></textarea>
                            </div>

                            <hr>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/clinica/dashboard" class="btn btn-light px-4">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-5">
                                    <i class="bi bi-save me-2"></i> Guardar Cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="mt-4 card border-warning bg-light">
                    <div class="card-body py-2">
                        <small class="text-warning-emphasis">
                            <i class="bi bi-exclamation-triangle-fill me-1"></i> 
                            Recuerda mantener tus datos actualizados para que los clientes puedan encontrarte fácilmente.
                        </small>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
