<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Clínico | ClínicaApp</title>
    <link th:replace="~{fragments/header :: favIcon}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --medical-gradient: linear-gradient(135deg, #0ea5e9 0%, #059669 100%);
            --dark-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --shadow-soft: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #f0fdf4 100%);
            min-height: 100vh;
            color: #334155;
        }

        /* Navbar Médico Premium */
        .navbar {
            background: var(--dark-gradient) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.25rem 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.35rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(to right, #fff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .navbar-brand i {
            background: linear-gradient(135deg, #38bdf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }

        .navbar span span {
            background: linear-gradient(135deg, #38bdf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .btn-outline-light {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 0.625rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Card de Info del Paciente */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        .col-md-4 .card {
            position: sticky;
            top: 2rem;
        }

        .card-body {
            padding: 2rem;
        }

        .col-md-4 .card-body h5 {
            font-size: 1.25rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .col-md-4 .card-body h5::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--medical-gradient);
            border-radius: 2px;
        }

        .col-md-4 p {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem 0;
            margin: 0;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.95rem;
        }

        .col-md-4 p:last-of-type {
            border-bottom: none;
        }

        .col-md-4 strong {
            color: #64748b;
            font-weight: 600;
        }

        .col-md-4 span {
            font-weight: 700;
            color: #0f172a;
        }

        .col-md-4 hr {
            margin: 1.5rem 0;
            border-color: #e2e8f0;
            opacity: 1;
        }

        .col-md-4 .small {
            font-size: 0.85rem !important;
            color: #94a3b8;
            font-weight: 500;
        }

        .col-md-4 .small span {
            font-family: 'Courier New', monospace;
            background: #f1f5f9;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-weight: 600;
            color: #475569;
        }

        /* Título de Cronología */
        h4 {
            font-size: 1.75rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 2rem !important;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        h4::before {
            content: '\F293';
            font-family: 'bootstrap-icons';
            background: var(--medical-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        /* Timeline de Visitas Médicas */
        .col-md-8 .card {
            margin-bottom: 1.5rem;
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }

        .col-md-8 .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--medical-gradient);
            border-radius: 4px 0 0 4px;
        }

        .col-md-8 .card:hover {
            transform: translateX(8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .col-md-8 .card-body {
            padding: 1.75rem;
        }

        /* Header de cada visita */
        .d-flex.justify-content-between {
            margin-bottom: 1.25rem !important;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        h6 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0ea5e9;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0;
        }

        h6 i {
            background: linear-gradient(135deg, #0ea5e9, #059669);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .badge {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%) !important;
            color: #475569 !important;
            border: 1px solid #cbd5e1;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        /* Contenido médico */
        .mb-2 {
            margin-bottom: 1.25rem !important;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem !important;
        }

        p {
            color: #334155;
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 500;
        }

        /* Receta Médica Destacada */
        .bg-light {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%) !important;
            border: 1px solid #fecaca;
            border-radius: var(--radius-md);
            padding: 1.25rem !important;
            margin: 1rem 0;
        }

        .bg-light label {
            color: #dc2626;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bg-light label::before {
            content: '\F4B2';
            font-family: 'bootstrap-icons';
            font-size: 1rem;
        }

        .bg-light p {
            color: #991b1b;
            font-style: italic;
            font-weight: 600;
        }

        /* Botón PDF Premium */
        .btn-outline-danger {
            border: 2px solid #e2e8f0;
            color: #64748b;
            background: white;
            border-radius: 12px;
            padding: 0.75rem 1.25rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-outline-danger:hover {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
            border-color: transparent;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 38, 38, 0.3);
        }

        .btn-outline-danger i {
            font-size: 1.1rem;
        }

        /* Alerta de sin historial */
        .alert-info {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            border: none;
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            font-weight: 600;
            color: #0369a1;
            box-shadow: var(--shadow-soft);
        }

        .alert-info i {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Patient Profile Card */
        .patient-header {
            background: var(--dark-gradient);
            color: white;
            padding: 2.5rem 2rem;
            border-radius: var(--radius-xl);
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .patient-header::after {
            content: '\F620';
            font-family: 'bootstrap-icons';
            position: absolute;
            right: -20px;
            bottom: -20px;
            font-size: 10rem;
            opacity: 0.05;
            transform: rotate(-15deg);
        }

        .patient-avatar {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .vitals-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            background: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }

        .vital-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
        }

        .vital-item span {
            color: #0f172a;
            font-size: 0.9rem;
        }

        .vital-item i {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .follow-up-banner {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #1e40af;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--medical-gradient);
            border-radius: 5px;
        }

        /* Animaciones */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .col-md-8 .card {
            animation: slideIn 0.5s ease forwards;
        }

        .col-md-8 .card:nth-child(1) { animation-delay: 0.1s; }
        .col-md-8 .card:nth-child(2) { animation-delay: 0.2s; }
        .col-md-8 .card:nth-child(3) { animation-delay: 0.3s; }
        .col-md-8 .card:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-folder2-open me-2"></i> Expediente Médico: <span
                    th:text="${mascota.nombre}">Nombre</span>
            </span>
            <button onclick="window.history.back()" class="btn btn-outline-light btn-sm">Volver</button>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="patient-header shadow-lg">
                    <div class="patient-avatar">
                        <i th:class="${mascota.especie.name() == 'PERRO' ? 'bi bi-dog' : (mascota.especie.name() == 'GATO' ? 'bi bi-cat' : 'bi bi-heart-pulse')}"></i>
                    </div>
                    <h2 class="h3 fw-800 mb-1" th:text="${mascota.nombre}">Nombre</h2>
                    <p class="opacity-75 mb-3" th:text="${mascota.especie + ' • ' + mascota.raza}">Especie • Raza</p>
                    
                    <div class="d-flex gap-3 mt-4">
                        <div class="text-center">
                            <div class="small opacity-50">EDAD</div>
                            <div class="fw-bold"><span th:text="${mascota.getEdad()}">0</span> años</div>
                        </div>
                        <div class="border-start border-white border-opacity-25 ps-3">
                            <div class="small opacity-50">SEXO</div>
                            <div class="fw-bold"><i th:class="${mascota.sexo == 'Macho' ? 'bi bi-gender-male text-info' : 'bi bi-gender-female text-danger'}"></i> <span th:text="${mascota.sexo}">--</span></div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <p><strong>Propietario ID:</strong> <span th:text="${mascota.propietarioId}"></span></p>
                        <p><strong>Nacimiento:</strong> <span th:text="${mascota.fechaNacimiento}"></span></p>
                        <hr>
                        <p class="small text-muted">ID Sistema: <span th:text="${mascota.id}"></span></p>
                    </div>
                </div>
            </div>

            <!-- Línea de Tiempo de Visitas -->
            <div class="col-md-8">
                <h4 class="mb-4 fw-bold text-secondary">Cronología de Atenciones</h4>

                <div th:each="v : ${historial}" class="card shadow-sm border-0 mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="fw-bold text-primary">
                                <i class="bi bi-calendar-check"></i>
                                <span th:text="${#temporals.format(v.fechaVisita, 'dd/MM/yyyy HH:mm')}">Fecha</span>
                            </h6>
                            <div class="d-flex gap-2">
                                <span th:if="${v.estadoConciencia != null}" class="badge bg-primary bg-opacity-10 text-primary border-0" th:text="${v.estadoConciencia}">Conciencia</span>
                                <span th:if="${v.condicionCorporal != null}" class="badge bg-success bg-opacity-10 text-success border-0" th:text="${v.condicionCorporal}">Condición</span>
                            </div>
                        </div>

                        <!-- Vitals Bar -->
                        <div class="vitals-strip" th:if="${v.peso != null or v.temperatura != null}">
                            <div class="vital-item">
                                <i class="bi bi-speedometer2 text-primary"></i>
                                <span><span th:text="${v.peso != null ? v.peso : '--'}"></span> kg</span>
                            </div>
                            <div class="vital-item">
                                <i class="bi bi-thermometer-half text-danger"></i>
                                <span><span th:text="${v.temperatura != null ? v.temperatura : '--'}"></span> °C</span>
                            </div>
                            <div class="vital-item">
                                <i class="bi bi-heart-pulse text-success"></i>
                                <span><span th:text="${v.frecuenciaCardiaca != null ? v.frecuenciaCardiaca : '--'}"></span> bpm</span>
                            </div>
                            <div class="vital-item">
                                <i class="bi bi-wind text-info"></i>
                                <span><span th:text="${v.frecuenciaRespiratoria != null ? v.frecuenciaRespiratoria : '--'}"></span> rpm</span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold small text-muted d-block">Diagnóstico Clínico:</label>
                            <p class="mb-1 fw-bold" th:text="${v.diagnostico}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold small text-muted d-block">Tratamiento y Hallazgos:</label>
                            <p class="mb-1" th:text="${v.tratamiento}"></p>
                        </div>

                        <div th:if="${v.medicamentosRecetados != null && !v.medicamentosRecetados.isEmpty()}" class="bg-light p-3 rounded-3 mb-3 border-start border-4 border-danger">
                            <label class="fw-bold small text-danger d-block">Receta Médica:</label>
                            <p class="mb-0 italic" th:text="${v.medicamentosRecetados}"></p>
                        </div>

                        <!-- Next Appointment -->
                        <div class="follow-up-banner" th:if="${v.fechaProximaCita != null}">
                            <i class="bi bi-calendar-event"></i>
                            <div>
                                Próxima Revisión: <span th:text="${#temporals.format(v.fechaProximaCita, 'dd/MM/yyyy HH:mm')}"></span>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                            <div class="text-muted small">
                                <i class="bi bi-person-badge me-1"></i> Atendido por Clínica
                            </div>
                            <a th:href="@{'/clinica/descargar-receta/' + ${v.id}}" class="btn btn-sm btn-outline-danger"
                                target="_blank">
                                <i class="bi bi-file-pdf"></i> Ver Receta Completa
                            </a>
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(historial)}" class="alert alert-info">
                    <i class="bi bi-info-circle me-2"></i> Esta mascota no tiene registros médicos previos.
                </div>
            </div>
        </div>
    </div>
</body>

</html>
