<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Horario | ClínicaApp</title>
    <link th:replace="~{fragments/header :: favIcon}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --warning-gradient: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            --info-gradient: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%);
            --dark-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --shadow-soft: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fefce8 0%, #fef3c7 50%, #fde68a 100%);
            min-height: 100vh;
            color: #334155;
        }

        /* Navbar Premium */
        .navbar {
            background: var(--dark-gradient) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.25rem 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.35rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(to right, #fff, #fcd34d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .navbar-brand i {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
            animation: clock-tick 2s ease-in-out infinite;
        }

        @keyframes clock-tick {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        .btn-outline-light {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 0.625rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Card Principal Premium */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        .card-header {
            background: linear-gradient(135deg, #ffffff 0%, #fefce8 100%) !important;
            border-bottom: 2px solid #fcd34d;
            padding: 2rem !important;
            position: relative;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--warning-gradient);
        }

        .card-header h5 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f172a;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-header h5::after {
            content: '\F293';
            font-family: 'bootstrap-icons';
            background: var(--warning-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
            margin-left: auto;
        }

        .card-body {
            padding: 2.5rem !important;
        }

        /* Form Labels Premium */
        .form-label {
            font-size: 0.85rem;
            font-weight: 800;
            color: #78716c;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--warning-gradient);
            border-radius: 50%;
        }

        /* Inputs de Tiempo Premium */
        .form-control-lg {
            border: 2px solid #e7e5e4;
            border-radius: var(--radius-md);
            padding: 1.25rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            text-align: center;
            background: linear-gradient(135deg, #fafaf9 0%, #f5f5f4 100%);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .form-control-lg:hover {
            border-color: #fcd34d;
            background: white;
        }

        .form-control-lg:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
            background: white;
            transform: translateY(-2px);
        }

        /* Select Premium */
        .form-select {
            border: 2px solid #e7e5e4;
            border-radius: var(--radius-md);
            padding: 1.25rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
            background-color: #fafaf9;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-select:hover {
            border-color: #fcd34d;
        }

        .form-select:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
        }

        /* Alerta Info Premium */
        .alert-info {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            border: none;
            border-radius: var(--radius-md);
            padding: 1.25rem;
            font-weight: 600;
            color: #0369a1;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .alert-info i {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .alert-info span {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 1.1rem;
        }

        /* Botón Guardar Premium */
        .btn-warning {
            background: var(--warning-gradient);
            border: none;
            border-radius: var(--radius-md);
            padding: 1.25rem;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            color: #78350f;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .btn-warning::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .btn-warning:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.4);
            color: #78350f;
        }

        .btn-warning:hover::before {
            left: 100%;
        }

        .btn-warning i {
            font-size: 1.25rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .card-body {
                padding: 1.5rem !important;
            }

            .form-control-lg {
                font-size: 1.1rem;
                padding: 1rem;
            }

            .alert-info {
                flex-direction: column;
                text-align: center;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #fefce8;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--warning-gradient);
            border-radius: 5px;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand"><i class="bi bi-clock-history me-2"></i> Jornada Laboral</span>
            <a href="/clinica/dashboard" class="btn btn-outline-light btn-sm">Volver</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-header bg-white py-3 border-0">
                        <h5 class="mb-0 fw-bold">Definir Disponibilidad de Agenda</h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/clinica/horario/guardar}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold small">HORA DE APERTURA</label>
                                <input type="time" name="horaApertura" th:value="${clinica.horaApertura}" class="form-control form-control-lg" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">HORA DE CIERRE</label>
                                <input type="time" name="horaCierre" th:value="${clinica.horaCierre}" class="form-control form-control-lg" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold small">DURACIÓN POR CITA (Minutos)</label>
                                <select name="duracionTurnoMinutos" class="form-select">
                                    <option value="15" th:selected="${clinica.duracionTurnoMinutos == 15}">15 minutos</option>
                                    <option value="30" th:selected="${clinica.duracionTurnoMinutos == 30}">30 minutos</option>
                                    <option value="45" th:selected="${clinica.duracionTurnoMinutos == 45}">45 minutos</option>
                                    <option value="60" th:selected="${clinica.duracionTurnoMinutos == 60}">1 hora</option>
                                </select>
                            </div>
                            <div class="alert alert-info py-2 small">
                                <i class="bi bi-info-circle"></i> Los clientes verán turnos disponibles cada <span th:text="${clinica.duracionTurnoMinutos}"></span> minutos.
                            </div>
                            <button type="submit" class="btn btn-warning w-100 fw-bold shadow-sm">
                                <i class="bi bi-save me-1"></i> GUARDAR DISPONIBILIDAD
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
