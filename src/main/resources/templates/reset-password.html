<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Establece tu nueva contraseña de Clínica App de forma segura.">
    <title>Nueva Contraseña | Clínica App</title>
    <link th:replace="~{fragments/header :: favIcon}">
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }

        .password-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: none;
        }

        .password-header {
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }

        .password-icon {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.75rem;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .password-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .password-body {
            padding: 2rem;
        }

        .password-description {
            color: #64748b;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Alertas */
        .alert-custom {
            border: none;
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .alert-danger-custom {
            background: #fef2f2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        /* Formulario */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .input-group-custom {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1.1rem;
            z-index: 10;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0.25rem;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .toggle-password:hover {
            color: #0d6efd;
        }

        .form-control-custom {
            width: 100%;
            padding: 0.875rem 3rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-control-custom:focus {
            outline: none;
            border-color: #10b981;
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .form-control-custom.is-invalid {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .invalid-feedback {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            color: #ef4444;
        }

        /* Indicador de fortaleza */
        .password-strength {
            margin-top: 0.75rem;
        }

        .strength-bar {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .strength-fill {
            height: 100%;
            width: 0;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .strength-fill.weak { width: 33%; background: #ef4444; }
        .strength-fill.medium { width: 66%; background: #f59e0b; }
        .strength-fill.strong { width: 100%; background: #10b981; }

        .strength-text {
            font-size: 0.8rem;
            color: #6b7280;
        }

        /* Requisitos */
        .password-requirements {
            background: #f9fafb;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .requirements-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .requirement-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 0.5rem;
        }

        .requirement-item:last-child {
            margin-bottom: 0;
        }

        .requirement-item i {
            font-size: 0.75rem;
        }

        .requirement-item.valid {
            color: #10b981;
        }

        .requirement-item.valid i {
            color: #10b981;
        }

        /* Botón */
        .btn-save {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-save:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-save:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-save.loading {
            color: transparent;
            position: relative;
        }

        .btn-save.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 576px) {
            body {
                padding: 1rem;
                background: white;
            }

            .password-card {
                box-shadow: none;
                border-radius: 0;
            }

            .password-header {
                padding: 2rem 1.5rem;
            }

            .password-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="password-container">
        <div class="password-card">
            <!-- Header -->
            <div class="password-header">
                <div class="password-icon">
                    <i class="bi bi-shield-check"></i>
                </div>
                <h1 class="password-title">Nueva Contraseña</h1>
            </div>

            <!-- Body -->
            <div class="password-body">
                <p class="password-description">
                    Crea una contraseña segura para proteger tu cuenta. Debe cumplir con los siguientes requisitos.
                </p>

                <!-- Alerta de Error -->
                <div th:if="${error}" class="alert alert-custom alert-danger-custom" role="alert">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <span th:text="${error}"></span>
                </div>

                <!-- Requisitos -->
                <div class="password-requirements">
                    <div class="requirements-title">Requisitos de seguridad</div>
                    <div class="requirement-item" id="req-length">
                        <i class="bi bi-circle"></i>
                        <span>Mínimo 8 caracteres</span>
                    </div>
                    <div class="requirement-item" id="req-number">
                        <i class="bi bi-circle"></i>
                        <span>Al menos un número</span>
                    </div>
                    <div class="requirement-item" id="req-special">
                        <i class="bi bi-circle"></i>
                        <span>Al menos un carácter especial</span>
                    </div>
                </div>

                <!-- Formulario -->
                <form th:action="@{/reset-password}" method="post" id="passwordForm">
                    <input type="hidden" name="token" th:value="${token}" />

                    <div class="form-group">
                        <label for="password" class="form-label">Nueva Contraseña</label>
                        <div class="input-group-custom">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" 
                                   id="password" 
                                   name="password" 
                                   class="form-control-custom" 
                                   placeholder="••••••••"
                                   required>
                            <button type="button" class="toggle-password" id="togglePassword">
                                <i class="bi bi-eye-slash"></i>
                            </button>
                        </div>
                        
                        <!-- Indicador de fortaleza -->
                        <div class="password-strength" id="strengthContainer" style="display: none;">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <div class="strength-text" id="strengthText">Ingresa una contraseña</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
                        <div class="input-group-custom">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <input type="password" 
                                   id="confirmPassword" 
                                   name="confirmPassword" 
                                   class="form-control-custom" 
                                   placeholder="••••••••"
                                   required>
                            <button type="button" class="toggle-password" id="toggleConfirm">
                                <i class="bi bi-eye-slash"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback" id="matchFeedback">
                            <i class="bi bi-exclamation-circle"></i>
                            Las contraseñas no coinciden
                        </div>
                    </div>

                    <button type="submit" class="btn-save" id="submitBtn" disabled>
                        <span>Guardar Contraseña</span>
                        <i class="bi bi-check-lg"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" 
            crossorigin="anonymous"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const password = document.getElementById('password');
            const confirmPassword = document.getElementById('confirmPassword');
            const submitBtn = document.getElementById('submitBtn');
            const strengthContainer = document.getElementById('strengthContainer');
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');
            const matchFeedback = document.getElementById('matchFeedback');

            // Toggle password visibility
            function setupToggle(inputId, buttonId) {
                const input = document.getElementById(inputId);
                const button = document.getElementById(buttonId);
                const icon = button.querySelector('i');

                button.addEventListener('click', function() {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    icon.classList.toggle('bi-eye-slash');
                    icon.classList.toggle('bi-eye');
                });
            }

            setupToggle('password', 'togglePassword');
            setupToggle('confirmPassword', 'toggleConfirm');

            // Validación de requisitos
            function checkRequirements(value) {
                const hasLength = value.length >= 8;
                const hasNumber = /\d/.test(value);
                const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(value);

                updateRequirement('req-length', hasLength);
                updateRequirement('req-number', hasNumber);
                updateRequirement('req-special', hasSpecial);

                return hasLength && hasNumber && hasSpecial;
            }

            function updateRequirement(id, valid) {
                const el = document.getElementById(id);
                const icon = el.querySelector('i');
                
                if (valid) {
                    el.classList.add('valid');
                    icon.classList.remove('bi-circle');
                    icon.classList.add('bi-check-circle-fill');
                } else {
                    el.classList.remove('valid');
                    icon.classList.remove('bi-check-circle-fill');
                    icon.classList.add('bi-circle');
                }
            }

            // Indicador de fortaleza
            function checkStrength(value) {
                if (value.length === 0) {
                    strengthContainer.style.display = 'none';
                    return 0;
                }

                strengthContainer.style.display = 'block';
                let strength = 0;
                
                if (value.length >= 8) strength++;
                if (value.match(/[a-z]/) && value.match(/[A-Z]/)) strength++;
                if (value.match(/\d/)) strength++;
                if (value.match(/[^a-zA-Z0-9]/)) strength++;

                strengthFill.className = 'strength-fill';
                
                if (strength <= 1) {
                    strengthFill.classList.add('weak');
                    strengthText.textContent = 'Débil';
                    strengthText.style.color = '#ef4444';
                } else if (strength === 2 || strength === 3) {
                    strengthFill.classList.add('medium');
                    strengthText.textContent = 'Media';
                    strengthText.style.color = '#f59e0b';
                } else {
                    strengthFill.classList.add('strong');
                    strengthText.textContent = 'Fuerte';
                    strengthText.style.color = '#10b981';
                }

                return strength;
            }

            // Validación de coincidencia
            function checkMatch() {
                if (confirmPassword.value && password.value !== confirmPassword.value) {
                    confirmPassword.classList.add('is-invalid');
                    matchFeedback.style.display = 'flex';
                    return false;
                } else {
                    confirmPassword.classList.remove('is-invalid');
                    matchFeedback.style.display = 'none';
                    return true;
                }
            }

            // Validación general
            function validateForm() {
                const requirements = checkRequirements(password.value);
                const match = checkMatch();
                const hasValue = password.value.length > 0 && confirmPassword.value.length > 0;
                
                submitBtn.disabled = !(requirements && match && hasValue);
            }

            // Event listeners
            password.addEventListener('input', function() {
                checkRequirements(this.value);
                checkStrength(this.value);
                if (confirmPassword.value) checkMatch();
                validateForm();
            });

            confirmPassword.addEventListener('input', function() {
                checkMatch();
                validateForm();
            });

            // Submit
            document.getElementById('passwordForm').addEventListener('submit', function() {
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;
            });
        });
    </script>
</body>
</html>
