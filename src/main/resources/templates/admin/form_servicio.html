<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configurar Servicio | Admin</title>
    <link th:replace="~{fragments/header :: favIcon}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <div th:replace="~{fragments/header :: header-admin}"></div>
    <link th:replace="~{fragments/header :: headerStyles}">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #059669 0%, #10b981 100%);
            --info-gradient: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%);
            --dark-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.98);
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.15);
            --radius-xl: 20px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 50%, #f0f9ff 100%);
            min-height: 100vh;
            color: #334155;
            padding-bottom: 2rem;
        }

        /* Container ajustado */
        .container {
            padding: 0 1rem;
        }

        /* Card Principal */
        .card {
            background: var(--glass-bg);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        /* Header Oscuro Premium */
        .card-header {
            background: var(--dark-gradient) !important;
            color: white;
            padding: 1.75rem !important;
            border: none !important;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
        }

        .card-header h5 {
            font-size: 1.35rem;
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .card-header i {
            font-size: 1.5rem;
            animation: spin-gear 6s linear infinite;
        }

        @keyframes spin-gear {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card-body {
            padding: 2rem !important;
        }

        /* Form Labels Premium */
        .form-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--primary-gradient);
            border-radius: 50%;
        }

        /* Inputs Premium */
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            font-size: 1rem;
            font-weight: 600;
            color: #0f172a;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: white;
            transform: translateY(-1px);
        }

        .form-control::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        /* Input Grande para Nombre */
        .form-control-lg {
            font-size: 1.25rem;
            padding: 1.25rem;
        }

        /* Input Group para Precio */
        .input-group {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .input-group:focus-within {
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.2);
        }

        .input-group-text {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            border: 2px solid #e2e8f0;
            border-right: none;
            color: #059669;
            font-weight: 800;
            font-size: 1.25rem;
            padding: 1rem 1.25rem;
        }

        .input-group .form-control {
            border-left: none;
        }

        /* Textarea */
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }

        /* Helper Text */
        .form-text {
            font-size: 0.875rem;
            color: #64748b;
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: var(--radius-sm);
            border-left: 3px solid #667eea;
            font-weight: 500;
        }

        /* Divider */
        hr {
            border-color: #e2e8f0;
            margin: 2rem 0;
            opacity: 1;
        }

        /* Botones de Acción */
        .btn-light {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            color: #475569;
            border-radius: var(--radius-md);
            padding: 1rem 2rem;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-light:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
            color: #334155;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius-md);
            padding: 1rem 2.5rem;
            font-weight: 800;
            font-size: 1rem;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        /* Alerta Informativa */
        .alert-info-custom {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            border: 2px solid #7dd3fc;
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            margin-top: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            animation: slideUp 0.5s ease 0.3s both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-info-custom i {
            font-size: 1.5rem;
            color: #0ea5e9;
            flex-shrink: 0;
            margin-top: 0.125rem;
        }

        .alert-info-custom small {
            color: #0369a1;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.6;
        }

        .alert-info-custom strong {
            color: #0c4a6e;
        }

        /* Responsive */
        @media (min-width: 768px) {
            .container {
                padding: 0;
            }

            .card-body {
                padding: 2.5rem !important;
            }

            .col-md-6 {
                max-width: 600px;
            }

            .d-grid {
                display: flex !important;
                justify-content: flex-end;
                gap: 1rem;
            }

            .btn-light, .btn-primary {
                width: auto;
            }
        }

        @media (max-width: 767.98px) {
            .card-header {
                padding: 1.5rem !important;
            }

            .card-header h5 {
                font-size: 1.15rem;
            }

            .card-body {
                padding: 1.5rem !important;
            }

            .form-control-lg {
                font-size: 1.1rem;
                padding: 1rem;
            }

            .d-grid {
                flex-direction: column-reverse;
            }

            .btn-light, .btn-primary {
                width: 100%;
                justify-content: center;
            }

            .alert-info-custom {
                flex-direction: column;
                text-align: center;
                gap: 0.75rem;
            }
        }

        @media (max-width: 375px) {
            .card-header h5 {
                font-size: 1rem;
            }

            .form-label {
                font-size: 0.75rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-gradient);
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header-admin}"></div>

    <div class="container mt-4 mt-md-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white py-3">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-gear-wide-connected"></i>
                            <span th:text="${servicio.id == null ? 'Crear Nuevo Servicio Maestro' : 'Editar Servicio Maestro'}"></span>
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/servicios/guardar}" th:object="${servicio}" method="post">
                            
                            <!-- ID oculto -->
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-4">
                                <label class="form-label">Nombre del Servicio</label>
                                <input type="text" class="form-control form-control-lg" th:field="*{nombre}" 
                                       placeholder="Ej: Cirugía General, Vacunación..." required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Costo Base Sugerido (USD)</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{costo}" 
                                           required placeholder="0.00">
                                </div>
                                <div class="form-text">
                                    Este precio servirá de base, las clínicas podrán personalizarlo después.
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Descripción Pública</label>
                                <textarea class="form-control" th:field="*{descripcion}" rows="4" 
                                          placeholder="Explique en qué consiste este servicio para los clientes..." required></textarea>
                            </div>

                            <hr>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a th:href="@{/admin/servicios}" class="btn btn-light px-4">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-5 shadow">
                                    <i class="bi bi-save me-2"></i>
                                    Guardar Servicio
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="alert-info-custom">
                    <i class="bi bi-info-circle-fill"></i>
                    <small>
                        Al crear un nuevo <strong>Servicio Maestro</strong>, este aparecerá automáticamente en los paneles de todas las clínicas para que ellas decidan si ofrecerlo o no.
                    </small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
