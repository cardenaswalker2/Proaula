<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plantillas de Email | Admin</title>
    <link th:replace="~{fragments/header :: favIcon}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --info-gradient: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            --success-gradient: linear-gradient(135deg, #059669 0%, #10b981 100%);
            --warning-gradient: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            --dark-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.98);
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.15);
            --radius-xl: 20px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdfa 100%);
            min-height: 100vh;
            color: #334155;
            padding: 1.5rem 0;
        }

        /* Container ajustado para móvil */
        .container {
            padding: 0 1rem;
        }

        /* Alerta de Éxito */
        .alert-success {
            background: var(--success-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 1.25rem;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: var(--shadow-soft);
            animation: slideDown 0.5s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success i {
            font-size: 1.25rem;
        }

        /* Card Principal */
        .card {
            background: var(--glass-bg);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        /* Header con gradiente */
        .card-header {
            background: var(--info-gradient) !important;
            color: white;
            padding: 1.5rem !important;
            border: none !important;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .card-header h5 {
            font-size: 1.35rem;
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .card-header i {
            font-size: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .card-body {
            padding: 1.75rem !important;
        }

        /* Formularios Premium */
        .form-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--info-gradient);
            border-radius: 50%;
        }

        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            font-size: 1rem;
            font-weight: 500;
            color: #0f172a;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .form-control:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
            background: white;
            transform: translateY(-1px);
        }

        .form-control::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 150px;
            line-height: 1.6;
        }

        /* Form text helper */
        .form-text {
            font-size: 0.875rem;
            color: #64748b;
            margin-top: 0.75rem;
            font-weight: 500;
            padding-left: 0.5rem;
            border-left: 3px solid #e2e8f0;
        }

        /* Alerta de Info */
        .alert-warning {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border: 2px solid #fcd34d;
            border-radius: var(--radius-md);
            padding: 1.25rem;
            color: #92400e;
            font-weight: 600;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin: 1.5rem 0;
        }

        .alert-warning i {
            font-size: 1.25rem;
            color: #f59e0b;
            margin-top: 0.125rem;
        }

        .alert-warning strong {
            color: #78350f;
        }

        /* Botones de Acción */
        .btn-light {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            color: #475569;
            border-radius: var(--radius-md);
            padding: 1rem 2rem;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-light:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
            color: #334155;
            transform: translateY(-2px);
        }

        .btn-info {
            background: var(--info-gradient);
            border: none;
            color: white;
            border-radius: var(--radius-md);
            padding: 1rem 2.5rem;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .btn-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-info:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.4);
            color: white;
        }

        .btn-info:hover::before {
            left: 100%;
        }

        /* Responsive */
        @media (min-width: 768px) {
            body {
                padding: 3rem 0;
            }

            .container {
                padding: 0;
            }

            .card-body {
                padding: 2.5rem !important;
            }

            .d-grid {
                display: flex !important;
                justify-content: flex-end;
                gap: 1rem;
            }

            .btn-light, .btn-info {
                width: auto;
            }
        }

        @media (max-width: 767.98px) {
            .d-grid {
                flex-direction: column-reverse;
            }

            .btn-light, .btn-info {
                width: 100%;
                justify-content: center;
            }

            .card-header h5 {
                font-size: 1.2rem;
            }

            .card-body {
                padding: 1.5rem !important;
            }
        }

        @media (max-width: 375px) {
            .card-header {
                padding: 1.25rem !important;
            }

            .form-control {
                padding: 0.875rem 1rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--info-gradient);
            border-radius: 4px;
        }

        /* Animación de entrada */
        .card {
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <!-- Alerta de éxito -->
                <div th:if="${param.success}" class="alert alert-success shadow-sm border-0">
                    <i class="bi bi-check-circle-fill"></i> 
                    <span>¡Plantillas actualizadas correctamente!</span>
                </div>

                <div class="card shadow border-0">
                    <div class="card-header bg-info text-white py-3">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-envelope-paper"></i> 
                            Plantillas de Mensajería
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/configuracion/guardar}" th:object="${config}" method="post">
                            <input type="hidden" name="origen" value="email">

                            <div class="mb-4">
                                <label class="form-label fw-bold">Email de Contacto Oficial</label>
                                <input type="email" class="form-control" th:field="*{emailContacto}" required 
                                       placeholder="contacto@clinica.com">
                                <div class="form-text">
                                    Este correo aparecerá en el pie de página de los reportes y PDF.
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Mensaje de Bienvenida (Nuevos Usuarios)</label>
                                <textarea class="form-control" rows="5" th:field="*{mensajeBienvenida}" required
                                          placeholder="Bienvenido a nuestra clínica veterinaria..."></textarea>
                            </div>

                            <div class="alert alert-warning py-3">
                                <i class="bi bi-info-circle"></i>
                                <div>
                                    Los correos de <strong>Confirmación de Cita</strong> se generan automáticamente con los datos de la clínica.
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a th:href="@{/admin/dashboard}" class="btn btn-light px-4">Cancelar</a>
                                <button type="submit" class="btn btn-info text-white px-5 shadow">
                                    <i class="bi bi-save me-2"></i> Guardar Plantillas
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
