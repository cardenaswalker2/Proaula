<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comisión Stripe | Admin</title>
    <link th:replace="~{fragments/header :: favIcon}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --success-gradient: linear-gradient(135deg, #059669 0%, #10b981 100%);
            --stripe-gradient: linear-gradient(135deg, #635bff 0%, #0a2540 100%);
            --dark-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.98);
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.15);
            --radius-xl: 20px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #f0f9ff 100%);
            min-height: 100vh;
            color: #334155;
            padding: 1.5rem 0;
        }

        .container {
            padding: 0 1rem;
        }

        /* Alerta de Éxito */
        .alert-success {
            background: var(--success-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 1.25rem;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: var(--shadow-soft);
            animation: slideDown 0.5s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success i {
            font-size: 1.25rem;
        }

        /* Card Principal */
        .card {
            background: var(--glass-bg);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        /* Header con gradiente Stripe */
        .card-header {
            background: var(--stripe-gradient) !important;
            color: white;
            padding: 1.75rem !important;
            border: none !important;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(99, 91, 255, 0.3) 0%, transparent 70%);
            border-radius: 50%;
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #635bff, #00d4ff, #635bff);
            opacity: 0.5;
        }

        .card-header h5 {
            font-size: 1.35rem;
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .card-header i {
            font-size: 1.5rem;
            animation: pulse-percent 2s ease-in-out infinite;
        }

        @keyframes pulse-percent {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .card-body {
            padding: 2rem !important;
        }

        /* Label Premium */
        .form-label {
            font-size: 0.85rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--stripe-gradient);
            border-radius: 50%;
        }

        /* Input Group Premium */
        .input-group {
            box-shadow: 0 4px 12px rgba(99, 91, 255, 0.1);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .input-group:focus-within {
            box-shadow: 0 8px 25px rgba(99, 91, 255, 0.2);
        }

        .input-group-text {
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
            border: 2px solid #e0e7ff;
            border-right: none;
            color: #6366f1;
            font-weight: 800;
            font-size: 1.5rem;
            padding: 1rem 1.5rem;
        }

        .form-control {
            border: 2px solid #e0e7ff;
            border-left: none;
            padding: 1rem 1.25rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            text-align: center;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: white;
            box-shadow: none;
        }

        /* Form text descriptivo */
        .form-text {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 1rem;
            padding: 1rem;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: var(--radius-md);
            border-left: 4px solid #6366f1;
            font-style: italic;
            line-height: 1.6;
        }

        /* Botón Guardar Premium */
        .btn-primary {
            background: var(--stripe-gradient);
            border: none;
            border-radius: var(--radius-md);
            padding: 1.25rem;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(99, 91, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(99, 91, 255, 0.4);
            color: white;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        /* Link volver */
        .btn-link {
            color: #64748b;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            padding: 0.75rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-link:hover {
            color: #6366f1;
            background: #f5f3ff;
            border-radius: var(--radius-md);
        }

        .btn-link::before {
            content: '\F12F';
            font-family: 'bootstrap-icons';
            font-size: 1rem;
        }

        /* Responsive */
        @media (min-width: 768px) {
            body {
                padding: 3rem 0;
            }

            .container {
                padding: 0;
            }

            .card-body {
                padding: 2.5rem !important;
            }

            .col-md-6 {
                max-width: 500px;
            }
        }

        @media (max-width: 767.98px) {
            .card-header {
                padding: 1.5rem !important;
            }

            .card-header h5 {
                font-size: 1.2rem;
            }

            .card-body {
                padding: 1.5rem !important;
            }

            .form-control {
                font-size: 1.25rem;
            }

            .input-group-text {
                font-size: 1.25rem;
                padding: 0.875rem 1.25rem;
            }
        }

        @media (max-width: 375px) {
            .card-header h5 {
                font-size: 1.1rem;
            }

            .btn-primary {
                font-size: 1rem;
                padding: 1rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--stripe-gradient);
            border-radius: 4px;
        }

        /* Efecto de brillo en el input */
        .input-group::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
            pointer-events: none;
        }

        .input-group:hover::after {
            left: 100%;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <!-- Alerta de éxito -->
                <div th:if="${param.success}" class="alert alert-success shadow-sm border-0">
                    <i class="bi bi-check-circle-fill"></i>
                    <span>¡Comisión actualizada correctamente!</span>
                </div>

                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-percent"></i>
                            Configurar Comisión de Stripe
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/configuracion/guardar}" th:object="${config}" method="post">
                            <input type="hidden" name="origen" value="stripe">
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">Porcentaje de Retención</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text">%</span>
                                    <input type="number" step="0.1" class="form-control" 
                                           th:field="*{comisionStripe}" required 
                                           placeholder="2.9" min="0" max="100">
                                </div>
                                <div class="form-text">
                                    Este porcentaje se descontará automáticamente de los ingresos de las clínicas en cada transacción procesada por Stripe.
                                </div>
                            </div>

                            <div class="d-grid gap-3">
                                <button type="submit" class="btn btn-primary btn-lg shadow">
                                    <i class="bi bi-save me-2"></i>
                                    Guardar Cambios
                                </button>
                                <a th:href="@{/admin/dashboard}" class="btn btn-link text-muted">
                                    Volver al Dashboard
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
