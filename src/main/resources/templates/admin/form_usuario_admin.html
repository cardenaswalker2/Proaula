<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configurar Cuenta | Admin</title>
    <link th:replace="~{fragments/header :: favIcon}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

        <div th:replace="~{fragments/header :: header-admin}"></div>
    <link th:replace="~{fragments/header :: headerStyles}">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #059669 0%, #10b981 100%);
            --warning-gradient: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            --danger-gradient: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            --dark-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.98);
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.15);
            --radius-xl: 20px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 50%, #f5f3ff 100%);
            min-height: 100vh;
            color: #334155;
            padding-bottom: 2rem;
        }

        .container {
            padding: 0 1rem;
        }

        /* Card Principal */
        .card {
            background: var(--glass-bg);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        /* Header Oscuro Premium */
        .card-header {
            background: var(--dark-gradient) !important;
            color: white;
            padding: 1.75rem !important;
            border: none !important;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
        }

        .card-header h5 {
            font-size: 1.35rem;
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .card-header i {
            font-size: 1.5rem;
        }

        .card-body {
            padding: 2rem !important;
        }

        /* Form Labels Premium */
        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--primary-gradient);
            border-radius: 50%;
        }

        /* Inputs Premium */
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            font-size: 1rem;
            font-weight: 600;
            color: #0f172a;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: white;
            transform: translateY(-1px);
        }

        .form-control::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        /* Select Premium */
        .form-select {
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-md);
            padding: 1rem 2.5rem 1rem 1.25rem;
            font-size: 1rem;
            font-weight: 600;
            color: #0f172a;
            background-color: #f8fafc;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 16px 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
        }

        .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background-color: white;
        }

        /* Password Field Indicator */
        .input-group-password {
            position: relative;
        }

        .password-strength {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
            position: relative;
        }

        .password-strength::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: var(--warning-gradient);
            transition: width 0.3s ease;
        }

        .input-group-password:focus-within .password-strength::after {
            width: 60%;
        }

        /* Botones de Acción */
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius-md);
            padding: 1.25rem;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-link {
            color: #64748b;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            padding: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-link:hover {
            color: #667eea;
            background: #f5f3ff;
            border-radius: var(--radius-md);
        }

        .btn-link::before {
            content: '\F12F';
            font-family: 'bootstrap-icons';
            font-size: 1rem;
        }

        /* Role Badge Preview */
        .role-preview {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 700;
            margin-top: 0.75rem;
        }

        .role-preview.admin {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
        }

        .role-preview.veterinario {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #1e40af;
        }

        .role-preview.recepcion {
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            color: #9d174d;
        }

        .role-preview.cliente {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            color: #065f46;
        }

        /* Responsive */
        @media (min-width: 768px) {
            .container {
                padding: 0;
            }

            .card-body {
                padding: 2.5rem !important;
            }

            .col-md-6 {
                max-width: 550px;
            }

            .d-grid {
                display: flex !important;
                flex-direction: column;
                gap: 0.75rem;
            }

            .btn-primary {
                order: -1;
            }
        }

        @media (max-width: 767.98px) {
            .card-header {
                padding: 1.5rem !important;
            }

            .card-header h5 {
                font-size: 1.15rem;
            }

            .card-body {
                padding: 1.5rem !important;
            }

            .form-control,
            .form-select {
                padding: 0.875rem 1rem;
            }

            .btn-primary,
            .btn-link {
                padding: 1rem;
            }
        }

        @media (max-width: 375px) {
            .card-header h5 {
                font-size: 1rem;
            }

            .form-label {
                font-size: 0.8rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-gradient);
            border-radius: 4px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container mt-4 mt-md-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white py-3">
                        <h5 class="mb-0">
                            <i class="bi bi-person-gear" th:if="${usuarioId != null}"></i>
                            <i class="bi bi-person-plus" th:unless="${usuarioId != null}"></i>
                            <span th:text="${usuarioId != null ? 'Editar Usuario' : 'Crear Nuevo Acceso'}"></span>
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/usuarios/guardar}" th:object="${usuarioDTO}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-4">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" th:field="*{nombre}" required
                                    placeholder="Ej: Juan Pérez González">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" th:field="*{email}" required
                                    placeholder="usuario@clinicaapp.com">
                            </div>

                            <div class="mb-4" th:if="${usuarioId == null}">
                                <label class="form-label">Contraseña Provisional</label>
                                <div class="input-group-password">
                                    <input type="password" class="form-control" th:field="*{password}" required
                                        placeholder="Mínimo 8 caracteres">
                                    <div class="password-strength"></div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Rol en el Sistema</label>

                                <!-- th:field="*{role}" vincula el select con el objeto y selecciona el valor actual al editar -->
                                <select class="form-select" th:field="*{role}" required>
                                    <option value="" disabled selected>Seleccionar rol...</option>
                                    <option th:each="r : ${rolesDisponibles}" th:value="${r}"
                                        th:text="${#strings.replace(r.name(), 'ROLE_', '')}">
                                    </option>
                                </select>

                                <!-- Previews de Rol (Se muestran al cargar si el usuario ya tiene un rol, ej: al editar) -->

                                <!-- Preview ADMIN -->
                                <div class="role-preview admin mt-2"
                                    th:if="*{role != null && role.name() == 'ROLE_ADMIN'}">
                                    <i class="bi bi-shield-lock"></i> Acceso Total al Sistema
                                </div>

                                <!-- Preview RECEPCIONISTA -->
                                <div class="role-preview recepcionista mt-2"
                                    th:if="*{role != null && role.name() == 'ROLE_RECEPCIONISTA'}">
                                    <i class="bi bi-headset"></i> Gestión de Citas y Recepción
                                </div>

                                <!-- Preview CLINICA -->
                                <div class="role-preview clinica mt-2"
                                    th:if="*{role != null && role.name() == 'ROLE_CLINICA'}">
                                    <i class="bi bi-hospital"></i> Perfil de Clínica Veterinaria
                                </div>

                                <!-- Preview USER (Cliente) -->
                                <div class="role-preview user mt-2"
                                    th:if="*{role != null && role.name() == 'ROLE_USER'}">
                                    <i class="bi bi-person"></i> Acceso Estándar de Cliente
                                </div>
                            </div>

                            <div class="d-grid gap-3">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-save"></i>
                                    Guardar Configuración
                                </button>
                                <a th:href="@{/admin/usuarios}" class="btn btn-link text-muted">
                                    Volver al Directorio
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
