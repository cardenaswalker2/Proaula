<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Restablece tu contraseña de Clínica App. Recupera el acceso a tu cuenta de forma segura.">
    <title>Restablecer Contraseña | Clínica App</title>
    <link th:replace="~{fragments/header :: favIcon}">
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }

        .reset-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reset-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: none;
        }

        .reset-header {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }

        .reset-icon {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.75rem;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .reset-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .reset-body {
            padding: 2rem;
        }

        .reset-description {
            color: #64748b;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Alertas */
        .alert-custom {
            border: none;
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .alert-danger-custom {
            background: #fef2f2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .alert-success-custom {
            background: #f0fdf4;
            color: #166534;
            border-left: 4px solid #22c55e;
        }

        /* Formulario */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .input-group-custom {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1.1rem;
            z-index: 10;
        }

        .form-control-custom {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-control-custom:focus {
            outline: none;
            border-color: #0d6efd;
            background: white;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
        }

        /* Botón */
        .btn-reset {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3);
        }

        .btn-reset:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset.loading {
            color: transparent;
            position: relative;
        }

        .btn-reset.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer del card */
        .reset-footer {
            text-align: center;
            padding: 1.5rem 2rem;
            background: #f8fafc;
            border-top: 1px solid #e5e7eb;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #0d6efd;
            gap: 0.75rem;
        }

        /* Success State */
        .success-state {
            text-align: center;
            padding: 2rem 0;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #f0fdf4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: #22c55e;
        }

        .success-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #166534;
            margin-bottom: 0.5rem;
        }

        .success-text {
            color: #64748b;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 576px) {
            body {
                padding: 1rem;
                background: white;
            }

            .reset-card {
                box-shadow: none;
                border-radius: 0;
            }

            .reset-header {
                padding: 2rem 1.5rem;
            }

            .reset-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <!-- Header -->
            <div class="reset-header">
                <div class="reset-icon">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h1 class="reset-title">¿Olvidaste tu contraseña?</h1>
            </div>

            <!-- Body -->
            <div class="reset-body">
                <!-- Descripción -->
                <p class="reset-description" th:unless="${success}">
                    No te preocupes. Ingresa tu correo electrónico y te enviaremos un enlace seguro para restablecer tu contraseña.
                </p>

                <!-- Alertas -->
                <div th:if="${error}" class="alert alert-custom alert-danger-custom" role="alert">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <span th:text="${error}"></span>
                </div>

                <div th:if="${success}" class="alert alert-custom alert-success-custom" role="alert">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${success}"></span>
                </div>

                <!-- Formulario (solo si no hay éxito) -->
                <form th:action="@{/forgot-password}" method="post" th:unless="${success}" id="resetForm">
                    <div class="form-group">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <div class="input-group-custom">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email" 
                                   id="email" 
                                   name="email" 
                                   class="form-control-custom" 
                                   placeholder="tu@email.com"
                                   required 
                                   autofocus>
                        </div>
                    </div>

                    <button type="submit" class="btn-reset" id="submitBtn">
                        <span>Enviar enlace de recuperación</span>
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </form>

                <!-- Estado de éxito alternativo -->
                <div th:if="${success}" class="success-state">
                    <div class="success-icon">
                        <i class="bi bi-envelope-check-fill"></i>
                    </div>
                    <h3 class="success-title">¡Revisa tu correo!</h3>
                    <p class="success-text">Hemos enviado las instrucciones a tu email.</p>
                </div>
            </div>

            <!-- Footer -->
            <div class="reset-footer">
                <a th:href="@{/login}" class="back-link">
                    <i class="bi bi-arrow-left"></i>
                    <span>Volver a Iniciar Sesión</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" 
            crossorigin="anonymous"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('resetForm');
            const submitBtn = document.getElementById('submitBtn');

            if (form) {
                form.addEventListener('submit', function() {
                    submitBtn.classList.add('loading');
                    submitBtn.disabled = true;
                });
            }
        });
    </script>
</body>
</html>
