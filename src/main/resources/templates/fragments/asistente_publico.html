<div th:fragment="guido-bot">
    <!-- Dependencias Visuales -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --g-primary: #0ea5e9;
            --g-secondary: #6366f1;
            --g-gradient: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            --g-bg: rgba(255, 255, 255, 0.85);
            --g-text: #0f172a;
        }

        /* BOTÓN DE ACTIVACIÓN INTELIGENTE */
        .guido-trigger {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 9999;
            width: 80px;
            height: 80px;
            border-radius: 28px;
            background: var(--g-gradient);
            border: 5px solid white;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(14, 165, 233, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .guido-trigger:hover {
            transform: scale(1.1) rotate(-10deg);
            box-shadow: 0 20px 45px rgba(14, 165, 233, 0.6);
        }

        .guido-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 28px;
            background: var(--g-primary);
            opacity: 0.5;
            animation: g-pulse 2s infinite;
        }

        @keyframes g-pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* VENTANA MAESTRA */
        .guido-panel {
            position: fixed;
            bottom: 120px;
            left: 30px;
            width: 420px;
            height: 75vh;
            max-height: 650px;
            background: var(--g-bg);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 10000;
            font-family: 'Plus Jakarta Sans', sans-serif;
            animation: g-slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes g-slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* CABECERA PRO */
        .g-header {
            padding: 30px;
            background: var(--g-gradient);
            color: white;
            position: relative;
        }

        .g-header-title {
            font-weight: 800;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .g-header-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* CUERPO DINÁMICO */
        .g-content {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* TARJETAS DE MÓDULOS (Cápsulas) */
        .g-card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
            transition: 0.3s;
            cursor: pointer;
        }

        .g-card:hover {
            transform: translateY(-5px);
            border-color: var(--g-primary);
            box-shadow: 0 15px 30px rgba(14, 165, 233, 0.1);
        }

        .g-card i {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: #f0f9ff;
            color: var(--g-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        /* BARRA DE PROGRESO DEL TOUR */
        .g-progress-container {
            padding: 0 30px 20px;
            background: var(--g-gradient);
        }

        .g-progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .g-progress-fill {
            height: 100%;
            background: white;
            width: 0%;
            transition: 0.5s;
        }

        /* BOTONES DE ACCIÓN */
        .g-btn-main {
            background: var(--g-gradient);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }

        .g-step-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #475569;
        }

        .typing-effect::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>

    <!-- UI ESTRUCTURA -->
    <div class="guido-trigger" id="guidoBtn">
        <div class="guido-pulse"></div>
        <i class="bi bi-robot text-white fs-1" style="position:relative; z-index:2"></i>
    </div>

    <div class="guido-panel" id="guidoPanel">
        <div class="g-header">
            <div class="g-header-title">
                <i class="bi bi-stars"></i> GUIDO 
                <span class="g-header-badge">AI Assistant</span>
            </div>
            <p class="m-0 mt-1 opacity-75 small">Especialista en Onboarding Digital</p>
            <button class="btn-close btn-close-white position-absolute top-0 end-0 m-4" id="closeGuido"></button>
        </div>
        
        <div class="g-progress-container">
            <div class="g-progress-bar">
                <div class="g-progress-fill" id="gProgress"></div>
            </div>
        </div>

        <div class="g-content" id="gContent">
            <!-- El contenido cambia dinámicamente -->
        </div>

        <div style="padding: 20px; background: white; border-top: 1px solid #f1f5f9;">
            <button class="g-btn-main" id="gNextBtn">
                CONTINUAR TOUR <i class="bi bi-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- LOGICA MAESTRA -->
    <script th:inline="javascript">
        const GUIDO_TOUR = [
            {
                title: "¡Bienvenido a la Revolución!",
                text: "Hola, soy **Guido**. Cartagena ahora tiene el ecosistema veterinario más avanzado de Colombia. Déjame mostrarte por qué somos diferentes.",
                icon: "bi-rocket-takeoff",
                progress: 20
            },
            {
                title: "Agenda Médica Inteligente",
                text: "Olvida las llamadas. Con ClínicaApp, agendas en **tiempo real**, pagas seguro con Stripe y recibes recordatorios directos a tu WhatsApp.",
                icon: "bi-calendar-check-fill",
                progress: 40
            },
            {
                title: "Tu Mascota, en tu Bolsillo",
                text: "Accede al **Historial Clínico Digital** desde cualquier lugar. Vacunas, desparasitaciones y recetas siempre contigo en formato PDF.",
                icon: "bi-phone-vibrate-fill",
                progress: 60
            },
            {
                title: "¿Eres dueño de una Clínica?",
                text: "Digitalizamos tu operación. Te damos un panel de control para gestionar citas, doctores y facturación. Aumentamos tu visibilidad un **150%**.",
                icon: "bi-hospital-fill",
                progress: 80
            },
            {
                title: "Seguridad Grado Bancario",
                text: "Tus datos y transacciones están protegidos por encriptación SSL y biometría. Somos la plataforma más segura del mercado.",
                icon: "bi-shield-lock-fill",
                progress: 100
            }
        ];

        class GuidoExperience {
            constructor() {
                this.currentStep = 0;
                this.panel = document.getElementById('guidoPanel');
                this.content = document.getElementById('gContent');
                this.btnNext = document.getElementById('gNextBtn');
                this.progress = document.getElementById('gProgress');
                this.synth = window.speechSynthesis;
                
                this.init();
            }

            init() {
                document.getElementById('guidoBtn').onclick = () => this.open();
                document.getElementById('closeGuido').onclick = () => this.close();
                this.btnNext.onclick = () => this.nextStep();
            }

            open() {
                this.panel.style.display = 'flex';
                if(this.currentStep === 0) this.renderStep();
            }

            close() {
                this.panel.style.display = 'none';
                this.synth.cancel();
            }

            nextStep() {
                if(this.currentStep < GUIDO_TOUR.length - 1) {
                    this.currentStep++;
                    this.renderStep();
                } else {
                    window.location.href = "/registro";
                }
            }

            renderStep() {
                const step = GUIDO_TOUR[this.currentStep];
                
                // Actualizar Progreso
                this.progress.style.width = `${step.progress}%`;

                // Crear el HTML del paso
                this.content.innerHTML = `
                    <div class="g-card">
                        <i class="bi ${step.icon}"></i>
                        <h4 class="fw-bold" style="color:var(--g-primary)">${step.title}</h4>
                        <p class="g-step-text">${step.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>
                    </div>
                    ${this.currentStep === 0 ? this.renderStats() : ''}
                `;

                if(this.currentStep === GUIDO_TOUR.length - 1) {
                    this.btnNext.innerHTML = "✨ ¡CREAR MI CUENTA GRATIS!";
                    this.btnNext.style.background = "linear-gradient(135deg, #10b981, #059669)";
                }

                this.speak(step.text.replace(/\*\*/g, ''));
            }

            renderStats() {
                return `
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="g-card" style="padding:15px; text-align:center;">
                            <div class="fw-800 fs-4 text-primary">+12K</div>
                            <small class="text-muted">Usuarios</small>
                        </div>
                        <div class="g-card" style="padding:15px; text-align:center;">
                            <div class="fw-800 fs-4 text-success">50+</div>
                            <small class="text-muted">Clínicas</small>
                        </div>
                    </div>
                `;
            }

            speak(text) {
                this.synth.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-ES';
                utterance.rate = 1.1;
                utterance.pitch = 1.0;
                this.synth.speak(utterance);
            }
        }

        const guido = new GuidoExperience();
    </script>
</div>
