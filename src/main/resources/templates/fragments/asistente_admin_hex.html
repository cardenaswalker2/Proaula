<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="hex-admin">
    <style>
        :root {
            --hex-primary: #6366f1;
            --hex-secondary: #ec4899;
            --hex-cyan: #06b6d4;
            --hex-dark: #0f172a;
            --hex-grad: linear-gradient(135deg, var(--hex-primary) 0%, var(--hex-secondary) 100%);
        }

        /* ACTIVADOR HEX */
        .hex-wrapper {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hex-avatar {
            width: 85px;
            height: 85px;
            background: var(--hex-dark);
            border: 3px solid var(--hex-primary);
            border-radius: 50% 20% 50% 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.5);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .hex-avatar::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, var(--hex-cyan), transparent);
            animation: hex-rotate 4s linear infinite;
        }

        .hex-avatar i {
            font-size: 2.8rem;
            color: white;
            z-index: 2;
            filter: drop-shadow(0 0 8px var(--hex-cyan));
        }

        @keyframes hex-rotate {
            100% { transform: rotate(360deg); }
        }

        .hex-bubble {
            background: var(--hex-dark);
            color: white;
            padding: 10px 18px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 12px;
            border-left: 4px solid var(--hex-cyan);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            animation: hex-float 3s infinite ease-in-out;
        }

        /* PANEL PRINCIPAL HEX */
        .hex-panel {
            position: fixed;
            bottom: 140px;
            left: 30px;
            width: 420px;
            max-height: 700px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(25px);
            border-radius: 28px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: white;
            overflow: hidden;
            z-index: 10000;
            animation: hex-appear 0.4s ease-out;
        }

        @keyframes hex-appear {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* RESPONSIVIDAD HEX MÓVIL */
        @media (max-width: 500px) {
            .hex-avatar {
                width: 65px;
                height: 65px;
            }
            .hex-avatar i {
                font-size: 2rem;
            }
            .hex-bubble {
                font-size: 0.7rem;
                padding: 8px 14px;
            }
            .hex-panel {
                width: calc(100% - 40px);
                left: 20px;
                bottom: 100px;
                max-height: 80vh;
            }
            .hex-commands {
                grid-template-columns: 1fr;
            }
        }

        .hex-header {
            padding: 20px;
            background: linear-gradient(90deg, #1e1b4b, #312e81);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .hex-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--hex-cyan);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--hex-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--hex-cyan);
            animation: hex-pulse 1.5s infinite;
        }

        /* CUERPO DEL CHAT */
        .hex-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
        }

        .hex-msg {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 18px;
            font-size: 0.9rem;
            border-left: 3px solid var(--hex-primary);
            position: relative;
        }

        /* GRID DE COMANDOS */
        .hex-commands {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 0 20px 20px;
        }

        .cmd-btn {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #c7d2fe;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cmd-btn:hover {
            background: var(--hex-primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        /* SIMULADOR DE SCANNER */
        .hex-scanner {
            height: 2px;
            background: var(--hex-cyan);
            width: 0%;
            margin-top: 10px;
            box-shadow: 0 0 10px var(--hex-cyan);
        }

        @keyframes hex-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes hex-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>

    <div class="hex-wrapper">
        <div class="hex-bubble" id="hexBubble" onclick="hexBot.toggle()">
            HEX SYSTEM: ONLINE ⚡
        </div>
        <div class="hex-avatar" onclick="hexBot.toggle()">
            <i class="bi bi-cpu"></i>
        </div>
    </div>

    <div class="hex-panel" id="hexPanel">
        <div class="hex-header">
            <div>
                <h6 class="m-0 fw-bold text-white">HEX: Core Intelligence</h6>
                <div class="hex-status">
                    <div class="status-dot"></div>
                    Sincronizado con ClínicaApp Cloud
                </div>
            </div>
            <button class="btn-close btn-close-white" onclick="hexBot.toggle()"></button>
        </div>

        <div class="hex-body" id="hexChat">
            <div class="hex-msg">
                Hola, Administrador. Soy <strong>HEX</strong>. He escaneado los módulos de la infraestructura. 
                <div class="hex-scanner" id="hexScanner"></div>
            </div>
        </div>

        <div class="hex-commands">
            <button class="cmd-btn" onclick="hexBot.analyze()">
                <i class="bi bi-search"></i> Analizar KPIs
            </button>
            <button class="cmd-btn" onclick="hexBot.explain('stripe')">
                <i class="bi bi-credit-card"></i> Estado Stripe
            </button>
            <button class="cmd-btn" onclick="hexBot.explain('access')">
                <i class="bi bi-shield-lock"></i> Protocolos de Acceso
            </button>
            <button class="cmd-btn" onclick="hexBot.explain('emails')">
                <i class="bi bi-envelope-at"></i> Plantillas Mail
            </button>
            <button class="cmd-btn" style="grid-column: span 2; background: rgba(236, 72, 153, 0.15); color: #f9a8d4;" 
                    th:if="${totalPendientes > 0}" onclick="hexBot.urgent()">
                <i class="bi bi-exclamation-octagon-fill"></i> REVISAR SOLICITUDES CRÍTICAS (<span th:text="${totalPendientes}">0</span>)
            </button>
        </div>
    </div>

    <script>
        const hexBot = {
            panel: document.getElementById('hexPanel'),
            chat: document.getElementById('hexChat'),
            scanner: document.getElementById('hexScanner'),
            synth: window.speechSynthesis,

            toggle: function() {
                const isHidden = this.panel.style.display === 'none' || !this.panel.style.display;
                this.panel.style.display = isHidden ? 'flex' : 'none';
                if(isHidden) {
                    this.speak("Iniciando interfaz HEX. Reporte de infraestructura listo.");
                    this.runScanner();
                }
            },

            runScanner: function() {
                this.scanner.style.width = '0%';
                setTimeout(() => this.scanner.style.width = '100%', 100);
            },

            analyze: function() {
                // Lógica inteligente: HEX lee los valores reales de tus tarjetas KPI
                const recaudacion = document.querySelector('.kpi-card:nth-child(1) .kpi-value').innerText;
                const clinicas = document.querySelector('.kpi-card:nth-child(2) .kpi-value').innerText;
                const usuarios = document.querySelector('.kpi-card:nth-child(3) .kpi-value').innerText;

                const report = `Diagnóstico completo: La recaudación actual es de ${recaudacion}. Contamos con ${clinicas} sedes operativas y un total de ${usuarios} usuarios registrados en la base de datos global.`;
                this.addMsg(report, "cyan");
                this.speak(report);
            },

            explain: function(topic) {
                let text = "";
                if(topic === 'stripe') text = "El módulo de pagos está configurado en modo producción. Las comisiones se calculan automáticamente antes de cada dispersión a las clínicas.";
                if(topic === 'access') text = "El control de acceso permite la suspensión total de identidades. Si desactivas un usuario, sus tokens de sesión serán revocados en todo el sistema.";
                if(topic === 'emails') text = "Las plantillas de correo usan el motor Thymeleaf. Puedes personalizar los avisos de citas y bienvenidas desde Ajustes Maestros.";
                
                this.addMsg(text);
                this.speak(text);
            },

            urgent: function() {
                const msg = "Alerta: Hay solicitudes de clínicas esperando validación legal. Procede al panel de aprobación para evitar retrasos en la expansión de la red.";
                this.addMsg(msg, "pink");
                this.speak(msg);
            },

            addMsg: function(txt, theme) {
                const div = document.createElement('div');
                div.className = 'hex-msg';
                if(theme === "cyan") div.style.borderLeftColor = "var(--hex-cyan)";
                if(theme === "pink") div.style.borderLeftColor = "var(--hex-secondary)";
                div.innerHTML = txt;
                this.chat.appendChild(div);
                this.chat.scrollTop = this.chat.scrollHeight;
            },

            speak: function(t) {
                this.synth.cancel();
                const u = new SpeechSynthesisUtterance(t);
                u.lang = 'es-ES'; u.rate = 1.1; u.pitch = 0.7; // Voz técnica/robótica
                this.synth.speak(u);
            }
        };
    </script>
</div>

</body>
</html>
