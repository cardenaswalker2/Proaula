# ==================================================
# 🏥 CONFIGURACIÓN GENERAL DE LA APLICACIÓN
# ==================================================
spring.application.name=clinica-app
server.port=${PORT:8080}

# Configuración de Límites de Subida de Archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================================================
# 🐾 CONFIGURACIÓN DE MONGODB
# ==================================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/clinica_veterinaria_db}
spring.data.mongodb.database=clinica_veterinaria_db


# ==================================================
# 🖥️ CONFIGURACIÓN DE THYMELEAF
# ==================================================
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ==================================================
# 💳 CONFIGURACIÓN DE STRIPE (MODO DE PRUEBA)
# ==================================================
stripe.api.key.public=${STRIPE_PUBLIC_KEY}
stripe.api.key.secret=${STRIPE_SECRET_KEY}

# ==================================================
# 📧 CONFIGURACIÓN PARA ENVÍO DE CORREOS (GMAIL)
# ==================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==================================================
# 📞 CONFIGURACIÓN DE TWILIO
# ==================================================
twilio.account-sid=${TWILIO_SID}
twilio.auth-token=${TWILIO_TOKEN}
twilio.phone-number=${TWILIO_PHONE}


# ==================================================
# 🔑 CONFIGURACIÓN DE OAUTH2
# ==================================================

# --- Google ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid, profile, email

# --- GitHub ---
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

# Tiempos de timeout
spring.boot.admin.client.instance.health-check.timeout=300000 
server.connection-timeout=300000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2.client=DEBUG
logging.level.org.springframework.security.web=DEBUG
# ==================================================
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
